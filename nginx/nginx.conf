events {
    worker_connections 1024;
}

http {

    # =====================================================
    # Custom Access Log (MANDATORY REQUIREMENT)
    # Must include upstream_response_time
    # =====================================================

    log_format custom
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        'upstream_response_time=$upstream_response_time '
        '"$http_user_agent"';

    access_log /var/log/nginx/access.log custom;

    # =====================================================
    # Upstream Definitions (Primary + Backup)
    # =====================================================

    upstream us_backend {
        server backend-us:8000 max_fails=3 fail_timeout=10s;
        server backend-eu:8000 backup;
    }

    upstream eu_backend {
        server backend-eu:8000 max_fails=3 fail_timeout=10s;
        server backend-us:8000 backup;
    }

    # =====================================================
    # Main Server
    # =====================================================

    server {
        listen 80;

        # -----------------------------------------------
        # Route US Traffic
        # -----------------------------------------------
        location /us/ {

            # IMPORTANT: No trailing slash here
            # This preserves full URI (/us/...)
            proxy_pass http://us_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream error timeout invalid_header
                                http_500 http_502 http_503 http_504;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # -----------------------------------------------
        # Route EU Traffic
        # -----------------------------------------------
        location /eu/ {

            # IMPORTANT: No trailing slash
            proxy_pass http://eu_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream error timeout invalid_header
                                http_500 http_502 http_503 http_504;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}